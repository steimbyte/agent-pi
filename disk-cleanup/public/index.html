<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Disk Cleanup</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="layout">

    <header class="header">
      <div class="header-left">
        <h1 class="title">Disk Cleanup</h1>
        <span class="subtitle">Scan, analyze, and reclaim disk space</span>
      </div>
      <div class="header-right" id="disk-info"></div>
    </header>

    <section class="controls">
      <div class="control-row">
        <label class="control-label" for="dir-input">Directory</label>
        <input type="text" id="dir-input" class="input" placeholder="/Users/..." autocomplete="off" spellcheck="false">
      </div>
      <div class="control-row">
        <label class="control-label">Categories</label>
        <div class="checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" id="cat-temp" checked>
            <span class="tag tag-temp">Temporary</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="cat-compiled" checked>
            <span class="tag tag-compiled">Compiled</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="cat-archives" checked>
            <span class="tag tag-archives">Archives</span>
          </label>
        </div>
      </div>
      <div class="control-actions">
        <button class="btn btn-primary" id="btn-scan">Scan</button>
        <button class="btn btn-ghost" id="btn-clear" style="display:none">Clear</button>
      </div>
    </section>

    <div id="status" class="status" style="display:none"></div>

    <section id="results" class="results" style="display:none">

      <div class="results-header">
        <div class="results-summary" id="results-summary"></div>
        <button class="btn btn-secondary" id="btn-analyze" style="display:none">Analyze with AI</button>
      </div>

      <div id="ai-panel" class="ai-panel" style="display:none">
        <div class="ai-panel-header">
          <span class="ai-panel-title">AI Analysis</span>
          <button class="btn-icon" id="btn-close-ai" title="Close">&times;</button>
        </div>
        <div class="ai-panel-body" id="ai-body"></div>
      </div>

      <div id="category-groups"></div>

    </section>

    <div id="history-section" class="history-section" style="display:none">
      <button class="btn btn-ghost" id="btn-toggle-history">Deletion History</button>
      <div id="history-list" class="history-list" style="display:none"></div>
    </div>

    <footer id="action-bar" class="action-bar" style="display:none">
      <div class="action-bar-info">
        <span id="selected-count">0 selected</span>
        <span class="separator">|</span>
        <span id="selected-size">0 B</span>
      </div>
      <button class="btn btn-danger" id="btn-delete" disabled>Delete Selected</button>
    </footer>

  </div>

  <!-- Confirmation Modal -->
  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">Confirm Deletion</div>
      <div class="modal-body">
        <p class="modal-warning">The following items will be permanently deleted. This cannot be undone.</p>
        <div class="modal-file-list" id="modal-file-list"></div>
        <div class="modal-summary" id="modal-summary"></div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="btn-cancel">Cancel</button>
        <button class="btn btn-danger" id="btn-confirm">Delete</button>
      </div>
    </div>
  </div>

  <div id="scan-stats" class="scan-stats" style="display:none"></div>

  <script src="app.js"></script>
</body>
</html>
