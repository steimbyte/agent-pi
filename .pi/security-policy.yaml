# ═══════════════════════════════════════════════════════════════════
# Agent Security Policy
# ═══════════════════════════════════════════════════════════════════
# Controls what the agent can and cannot do. Loaded by security-guard.ts.
# Edit this file to tune rules — run /security reload to apply changes.
#
# Severity levels:
#   block  — hard stop, ask user for confirmation before proceeding
#   warn   — notify user but allow execution
#   log    — silently record in audit log
# ═══════════════════════════════════════════════════════════════════

# ── Dangerous Bash Commands ───────────────────────────────────────
# Patterns matched against the full bash command string.
# Uses regex syntax. Matched case-insensitively.
blocked_commands:
  # Destructive file operations
  - pattern: "rm\\s+(-[a-zA-Z]*r[a-zA-Z]*\\s+|--recursive)"
    description: "Recursive file deletion (rm -r / rm -rf)"
    severity: block
    category: destructive

  - pattern: "rm\\s+(-[a-zA-Z]*f[a-zA-Z]*\\s+)"
    description: "Forced file deletion (rm -f)"
    severity: block
    category: destructive

  - pattern: "rm\\s+.*\\*"
    description: "Wildcard file deletion"
    severity: block
    category: destructive

  - pattern: "rmdir\\s+--ignore-fail-on-non-empty"
    description: "Force directory removal"
    severity: block
    category: destructive

  - pattern: "find\\s+.*-delete"
    description: "find with -delete flag"
    severity: block
    category: destructive

  - pattern: "find\\s+.*-exec\\s+rm"
    description: "find with exec rm"
    severity: block
    category: destructive

  # Permission escalation
  - pattern: "chmod\\s+(777|666|a\\+[rwx])"
    description: "Overly permissive chmod"
    severity: warn
    category: permissions

  - pattern: "chown\\s+root"
    description: "Changing ownership to root"
    severity: warn
    category: permissions

  - pattern: "sudo\\s+"
    description: "Sudo usage"
    severity: block
    category: permissions

  # Pipe-to-shell (remote code execution)
  - pattern: "curl\\s+.*\\|\\s*(bash|sh|zsh|python|perl|ruby|node)"
    description: "Piping curl output to shell (remote code execution)"
    severity: block
    category: remote_exec

  - pattern: "wget\\s+.*\\|\\s*(bash|sh|zsh|python|perl|ruby|node)"
    description: "Piping wget output to shell (remote code execution)"
    severity: block
    category: remote_exec

  - pattern: "curl\\s+.*-o\\s+.*&&\\s*(bash|sh|chmod)"
    description: "Download-and-execute pattern"
    severity: block
    category: remote_exec

  - pattern: "eval\\s*\\$\\(curl"
    description: "Eval of remote content"
    severity: block
    category: remote_exec

  # Environment/secret dumping
  - pattern: "printenv"
    description: "Dumping all environment variables"
    severity: block
    category: exfiltration

  - pattern: "^env$"
    description: "Dumping all environment variables"
    severity: block
    category: exfiltration

  - pattern: "echo\\s+\\$[A-Z_]*(KEY|SECRET|TOKEN|PASSWORD|CREDENTIAL|AUTH)"
    description: "Echoing secret environment variables"
    severity: block
    category: exfiltration

  - pattern: "cat\\s+.*\\.(env|pem|key|p12|pfx|jks)"
    description: "Reading secret/key files"
    severity: warn
    category: exfiltration

  # Disk/system destructive
  - pattern: "mkfs\\."
    description: "Formatting filesystem"
    severity: block
    category: destructive

  - pattern: "dd\\s+.*of=/dev/"
    description: "Direct disk write"
    severity: block
    category: destructive

  - pattern: ":(){ :\\|:& };:"
    description: "Fork bomb"
    severity: block
    category: destructive

  # Nested shell execution (hides inner commands from scanning)
  - pattern: "(bash|sh|zsh)\\s+(-c|--command)\\s+"
    description: "Nested shell execution (bash -c / sh -c)"
    severity: warn
    category: remote_exec

  # Command obfuscation detection
  - pattern: "\\$\\(echo\\s+.*\\|\\s*base64\\s+-d\\)"
    description: "Base64-decoded command execution"
    severity: block
    category: remote_exec

  - pattern: "echo\\s+.*\\|\\s*base64\\s+-d\\s*\\|\\s*(bash|sh|zsh)"
    description: "Base64 decode piped to shell"
    severity: block
    category: remote_exec

  - pattern: "eval\\s+[\"'].*[\"']"
    description: "Eval with string argument (potential obfuscation)"
    severity: warn
    category: remote_exec

  - pattern: "\\beval\\s+\\$"
    description: "Eval of variable (potential obfuscation)"
    severity: block
    category: remote_exec

  - pattern: "\\$\\{.*\\}.*rm\\s+"
    description: "Variable expansion before rm command"
    severity: block
    category: destructive

  # Inline code execution with nested dangerous commands
  - pattern: "python[23]?\\s+(-c|--command)\\s+.*(os\\.system|subprocess|exec\\(|eval\\(|__import__)"
    description: "Python inline code with shell execution"
    severity: warn
    category: remote_exec

  - pattern: "node\\s+(-e|--eval)\\s+.*(execSync|exec\\(|spawn|child_process|require\\(.child_process)"
    description: "Node.js inline code with shell execution"
    severity: warn
    category: remote_exec

  - pattern: "ruby\\s+(-e)\\s+.*\\b(system|exec|`)\\b"
    description: "Ruby inline code with shell execution"
    severity: warn
    category: remote_exec

  - pattern: "perl\\s+(-e)\\s+.*\\b(system|exec|`)\\b"
    description: "Perl inline code with shell execution"
    severity: warn
    category: remote_exec

  # Hex/printf encoded command execution
  - pattern: "echo\\s+(-e\\s+)?.*\\\\x.*\\|\\s*(bash|sh|zsh)"
    description: "Hex-encoded command piped to shell"
    severity: block
    category: remote_exec

  - pattern: "printf\\s+.*\\\\x.*\\|\\s*(bash|sh|zsh)"
    description: "Printf hex-encoded command piped to shell"
    severity: block
    category: remote_exec

  - pattern: "xxd\\s+.*\\|\\s*(bash|sh|zsh)"
    description: "xxd decoded command piped to shell"
    severity: block
    category: remote_exec

  # History/log tampering
  - pattern: "history\\s+-c"
    description: "Clearing shell history"
    severity: warn
    category: tampering

  - pattern: "shred\\s+"
    description: "Secure file deletion (shred)"
    severity: block
    category: destructive

# ── Data Exfiltration Patterns ────────────────────────────────────
# Patterns that detect data being sent to external services.
exfiltration_patterns:
  - pattern: "curl\\s+.*(-X\\s+POST|--data|--upload-file|-F\\s+)"
    description: "HTTP POST/upload via curl"
    severity: warn
    category: exfiltration

  - pattern: "curl\\s+.*(transfer\\.sh|paste\\.ee|pastebin\\.com|gist\\.github|0x0\\.st|ix\\.io|file\\.io|hastebin)"
    description: "Upload to known paste/file sharing service"
    severity: block
    category: exfiltration

  - pattern: "scp\\s+.*@"
    description: "SCP file transfer to remote host"
    severity: block
    category: exfiltration

  - pattern: "rsync\\s+.*@.*:"
    description: "Rsync to remote host"
    severity: block
    category: exfiltration

  - pattern: "base64\\s+.*\\|\\s*curl"
    description: "Base64 encode piped to curl (exfiltration pattern)"
    severity: block
    category: exfiltration

  - pattern: "nc\\s+(-[a-zA-Z]*\\s+)*[0-9]+\\.[0-9]+"
    description: "Netcat connection to remote IP"
    severity: block
    category: exfiltration

  - pattern: "openssl\\s+s_client"
    description: "OpenSSL connection (potential data tunnel)"
    severity: warn
    category: exfiltration

# ── Protected Paths ───────────────────────────────────────────────
# File paths that should be protected from write/edit operations.
# Read is warn-only (agent needs to read for context).
protected_paths:
  # Security policy self-protection (CRITICAL)
  - pattern: "security-policy\\.ya?ml$"
    severity: block
    category: tampering
    description: "Security policy file (self-protection)"

  - pattern: "security-audit\\.log"
    severity: block
    category: tampering
    description: "Security audit log (tamper protection)"

  # SSH keys and config
  - pattern: "(\\.ssh|ssh)/(id_|authorized_keys|known_hosts|config)"
    severity: block
    category: credentials
    description: "SSH keys and configuration"

  - pattern: "\\.ssh/"
    severity: warn
    category: credentials
    description: "SSH directory access"

  # Cloud credentials
  - pattern: "\\.aws/(credentials|config)"
    severity: block
    category: credentials
    description: "AWS credentials"

  - pattern: "\\.azure/"
    severity: warn
    category: credentials
    description: "Azure configuration"

  - pattern: "\\.gcloud/"
    severity: warn
    category: credentials
    description: "Google Cloud configuration"

  # GPG/crypto keys
  - pattern: "\\.gnupg/"
    severity: block
    category: credentials
    description: "GPG keys and keyring"

  # Environment files
  - pattern: "\\.env(\\.local|\\.production|\\.staging)?$"
    severity: warn
    category: credentials
    description: "Environment variable files"

  # Key/certificate files
  - pattern: "\\.(pem|key|p12|pfx|jks|keystore)$"
    severity: warn
    category: credentials
    description: "Key/certificate files"

  # Token/secret config
  - pattern: "(secrets?|credentials?|tokens?)\\.ya?ml$"
    severity: warn
    category: credentials
    description: "Secrets configuration files"

  # NPM tokens, Docker config
  - pattern: "\\.npmrc$"
    severity: warn
    category: credentials
    description: "NPM configuration (may contain auth tokens)"

  - pattern: "\\.docker/config\\.json"
    severity: warn
    category: credentials
    description: "Docker configuration (may contain registry tokens)"

  # Keychain/password stores
  - pattern: "\\.password-store/"
    severity: block
    category: credentials
    description: "Password store"

  - pattern: "\\.(keychain|keychain-db)$"
    severity: block
    category: credentials
    description: "macOS Keychain"

# ── Prompt Injection Patterns ─────────────────────────────────────
# Detected in file contents, tool outputs, and user messages.
# These are the phrases an attacker embeds to hijack the agent.
prompt_injection_patterns:
  # Direct instruction override attempts
  - pattern: "ignore\\s+(all\\s+)?(previous|prior|above|earlier)\\s+(instructions?|rules?|prompts?|guidelines?)"
    severity: block
    category: prompt_injection
    description: "Attempt to override system instructions"

  - pattern: "disregard\\s+(all\\s+)?(previous|prior|above|earlier)\\s+(instructions?|rules?|prompts?)"
    severity: block
    category: prompt_injection
    description: "Attempt to disregard system instructions"

  - pattern: "forget\\s+(all\\s+)?(previous|prior|above|earlier)\\s+(instructions?|rules?|context)"
    severity: block
    category: prompt_injection
    description: "Attempt to reset agent context"

  - pattern: "new\\s+system\\s+prompt"
    severity: block
    category: prompt_injection
    description: "Attempt to inject new system prompt"

  - pattern: "override\\s+(your|the|all)\\s+(rules?|instructions?|guidelines?|restrictions?|safety)"
    severity: block
    category: prompt_injection
    description: "Attempt to override safety rules"

  - pattern: "(you\\s+are|act\\s+as|pretend\\s+(to\\s+be|you\\s+are))\\s+(now\\s+)?(a\\s+)?(different|new|unrestricted|jailbroken)"
    severity: block
    category: prompt_injection
    description: "Role hijacking attempt"

  - pattern: "DAN\\s+(mode|prompt)|do\\s+anything\\s+now"
    severity: block
    category: prompt_injection
    description: "Known jailbreak pattern (DAN)"

  # Data extraction attempts
  - pattern: "(dump|reveal|show|print|output|display|tell\\s+me)\\s+(your|the|all)\\s+(system\\s+prompt|instructions?|rules?|api\\s+keys?|secrets?|credentials?|tokens?|passwords?)"
    severity: block
    category: prompt_injection
    description: "Attempt to extract system information"

  - pattern: "(give|send|upload|post|transmit|exfiltrate|transfer)\\s+(me\\s+)?(all\\s+)?(your|the)\\s+(keys?|secrets?|credentials?|tokens?|passwords?|env|environment)"
    severity: block
    category: prompt_injection
    description: "Attempt to exfiltrate credentials"

  - pattern: "(upload|send|post|sync)\\s+(this|the|all|my|your)\\s+.*(to|at|on)\\s+(https?://|s3://|gs://|ftp://)"
    severity: block
    category: prompt_injection
    description: "Attempt to upload data to external URL"

  # Boundary/delimiter attacks
  - pattern: "</?\\s*(system|instruction|prompt|admin|root)\\s*>"
    severity: warn
    category: prompt_injection
    description: "XML-style prompt boundary injection"

  - pattern: "\\[\\s*(SYSTEM|INST|ADMIN|ROOT|OVERRIDE)\\s*\\]"
    severity: warn
    category: prompt_injection
    description: "Bracket-style prompt boundary injection"

  - pattern: "###\\s*(SYSTEM|INSTRUCTION|NEW PROMPT|ADMIN)"
    severity: warn
    category: prompt_injection
    description: "Markdown-style prompt boundary injection"

  # Encoded/obfuscated attempts
  - pattern: "(base64|rot13|hex)\\s*(decode|encode).*\\b(key|secret|token|password|credential)"
    severity: warn
    category: prompt_injection
    description: "Encoded credential access attempt"

# ── Allowlist ─────────────────────────────────────────────────────
# Patterns that explicitly bypass security checks.
# Use sparingly — each entry weakens the security posture.
allowlist:
  commands:
    # Normal dev operations
    - "git .*"
    - "npm .*"
    - "npx .*"
    - "yarn .*"
    - "pnpm .*"
    - "bun .*"
    - "node [a-zA-Z0-9_./@-]+(\\.js|\\.mjs|\\.cjs|\\.ts).*"
    - "deno [a-zA-Z0-9_./@-]+(\\.(ts|js|mjs)).*"
    - "cargo .*"
    - "python[23]? [a-zA-Z0-9_./@-]+\\.py.*"
    - "pip[23]? .*"
    - "brew .*"
    - "make .*"
    - "cmake .*"
    - "docker build.*"
    - "docker run.*"
    # File operations within project
    - "cat .*"
    - "head .*"
    - "tail .*"
    - "wc .*"
    - "sort .*"
    - "uniq .*"
    - "diff .*"
    - "grep .*"
    # find is NOT allowlisted — blocked_commands rules catch dangerous find flags
    # (find -delete, find -exec rm). Safe find commands pass through since they
    # don't match any blocked patterns.
    - "ls .*"
    - "mkdir .*"
    - "cp .*"
    - "mv .*"
    - "touch .*"
    # tee is NOT broadly allowlisted — tee can write to arbitrary paths.
    # Safe tee usage won't match blocked patterns.
    # sed and awk are NOT broadly allowlisted — sed -i can write to protected paths.
    # Safe sed/awk usage won't match any blocked patterns anyway.
    - "awk .*"
    - "jq .*"
    - "which .*"
    - "type .*"
    - "command -v .*"
    - "tree .*"

  paths:
    # Project-local files are always fine
    - "^\\.\\/.*"
    - "^[a-zA-Z](?!:[\\\\/]|.*\\.ssh|.*\\.aws|.*\\.env).*"

# ── Security Settings ─────────────────────────────────────────────
settings:
  # Enable/disable the entire security system
  enabled: true
  
  # Max audit log size in bytes before rotation (1MB)
  audit_log_max_bytes: 1048576
  
  # Whether to strip prompt injection from tool results (vs just warning)
  strip_injections: true
  
  # Whether to show verbose threat details in block messages
  verbose_blocks: true

  # Max chars allowed in a single tool result before truncation (0 = unlimited)
  max_tool_result_chars: 100000

  # Redact secrets/credentials from assistant output (OWASP #2)
  redact_secrets: true

  # Tool call budget — limits excessive agent autonomy (OWASP #6)
  # Set any value to 0 to disable that specific limit
  tool_budget_max_tool_calls_per_turn: 200
  tool_budget_max_tool_calls_per_session: 2000
  tool_budget_max_bash_calls_per_turn: 100
  tool_budget_warn_threshold_pct: 0.8
